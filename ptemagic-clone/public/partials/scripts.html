<script>window.addEventListener('DOMContentLoaded', function() {
    jQuery(document).ready(function($) {
        // Khởi tạo Owl Carousel cho logos
        var logosCarousel = $('#bao-chi-logos-carousel').owlCarousel({
            loop: true,
            margin: 20,
            nav: true,
            dots: false,
            autoplay: true,
            autoplayTimeout: 4000,
            autoplayHoverPause: true,
            center: true,
            responsive: {
                0: { items: 2 },
                600: { items: 3 },
                1000: { items: 3 }
            },
            navText: ['<i class="fas fa-chevron-left"></i>', '<i class="fas fa-chevron-right"></i>']
        });
        
        // Khởi tạo Owl Carousel cho content
        var contentCarousel = $('#bao-chi-content-carousel').owlCarousel({
            loop: true,
            margin: 0,
            nav: false,
            dots: false,
            autoplay: false,
            center: true,
            items: 1,
            animateOut: 'fadeOut',
            animateIn: 'fadeIn',
            smartSpeed: 500
        });
        
        // Xử lý sự kiện khi logo carousel thay đổi
        logosCarousel.on('changed.owl.carousel', function(event) {
            console.log('Logo carousel changed, direction:', event.direction);
            
            // Thực hiện đồng bộ content carousel
            if (event.direction === 'left') {
                console.log('Triggering next on content carousel');
                contentCarousel.trigger('next.owl.carousel');
            } else if (event.direction === 'right') {
                console.log('Triggering prev on content carousel');
                contentCarousel.trigger('prev.owl.carousel');
            }
            
            // Cập nhật trạng thái active cho logo
            setTimeout(function() {
                var currentTab = parseInt($('#bao-chi-logos-carousel .owl-item.active .bao-logo').data('tab'));
                $('.bao-logo').removeClass('active');
                $('.bao-logo[data-tab="' + currentTab + '"]').addClass('active');
            }, 100);
        });
        
        // Xử lý click trực tiếp trên navigation buttons
        $('#bao-chi-logos-carousel .owl-prev').on('click', function() {
            console.log('Prev button clicked');
            setTimeout(function() {
                contentCarousel.trigger('prev.owl.carousel');
            }, 300);
        });
        
        $('#bao-chi-logos-carousel .owl-next').on('click', function() {
            console.log('Next button clicked');
            setTimeout(function() {
                contentCarousel.trigger('next.owl.carousel');
            }, 300);
        });
        
        // Xử lý sự kiện khi content carousel thay đổi
        contentCarousel.on('changed.owl.carousel', function(event) {
            console.log('Content carousel changed');
            
            // Cập nhật trạng thái active cho logo
            setTimeout(function() {
                var currentTab = parseInt($('#bao-chi-content-carousel .owl-item.active [data-tab]').data('tab'));
                $('.bao-logo').removeClass('active');

        // Xử lý click vào logo
        $('.bao-logo').on('click', function() {
            var tabIndex = parseInt($(this).data('tab'));

            // Tìm vị trí hiện tại của logo carousel
            var currentLogoIndex = $('#bao-chi-logos-carousel .owl-item.active').index();

<script type="text/javascript">window.addEventListener('DOMContentLoaded', function() {
        if (typeof window.pricingNonce === 'undefined') {
            window.pricingNonce = 'f674fd56e7';
        }
        
        // Dynamic Pricing System
        (function($) {
            'use strict';
            
            var DynamicPricing = {
                // Configuration from ACF (can be set via PHP)
                config: {
                    startPrice: 1999000, // Giá ban đầu (ngày 1)
                    startDate: null, // Sẽ được set từ PHP hoặc localStorage
                    day1Price: 1999000,
                    day2to10Reduction: 100000, // Giảm mỗi ngày từ ngày 2-10
                    day11to30Reduction: 50000, // Giảm mỗi ngày từ ngày 11-30
                    totalDays: 30
                },
                
                init: function() {
                    console.log('Initializing Dynamic Pricing System...');
                    
                    var $wrappers = $('.pricing-promotion-wrapper');
                    if ($wrappers.length === 0) {
                        console.warn('Pricing component not found on page');
                        return;
                    }
                    
                    console.log('Pricing component found (' + $wrappers.length + ' instance(s)), initializing...');
                    
                    this.loadConfig();
                    
                    // Khởi tạo progress bar với giá trị ban đầu cho mọi instance
                    $wrappers.each(function() {
                        $(this).find('.pricing-slider-fill').css('width', '0%');
                    });
                    
                    // Nếu đã có startDate từ localStorage, cập nhật ngay
                    if (this.config.startDate) {
                        var currentDay = this.getCurrentDay();
                        this.updatePricing(currentDay);
                        console.log('Initial pricing updated from localStorage');
                    } else {
                        this.updatePricing(1);
                        console.log('Using default pricing (day 1)');
                    }
                    
                    this.startCountdown();
                    this.setupAjaxUpdate();
                },
                
                loadConfig: function() {
                    // Lấy config từ localStorage (sẽ được cập nhật từ server sau)
                    var savedConfig = localStorage.getItem('pricing_config');
                    if (savedConfig) {
                        try {
                            var config = JSON.parse(savedConfig);
                            // Chỉ merge các giá trị hợp lệ
                            if (config.startDate) this.config.startDate = parseInt(config.startDate);
                            if (config.day1Price) this.config.day1Price = parseInt(config.day1Price);
                            if (config.day2to10Reduction !== undefined) this.config.day2to10Reduction = parseInt(config.day2to10Reduction);
                            if (config.day11to30Reduction !== undefined) this.config.day11to30Reduction = parseInt(config.day11to30Reduction);
                            if (config.totalDays) this.config.totalDays = parseInt(config.totalDays);
                        } catch(e) {
                            console.error('Error parsing pricing config:', e);
                        }
                    }
                    
                    // Nếu chưa có startDate, sẽ được set từ server response
                    // Không set mặc định ở đây để tránh conflict với server
                },
                
                saveConfig: function() {
                    localStorage.setItem('pricing_config', JSON.stringify(this.config));
                },
                
                getCurrentDay: function() {
                    if (!this.config.startDate) {
                        console.log('No startDate, returning day 1');
                        return 1;
                    }
                    
                    // startDate là timestamp milliseconds từ server
                    var startDate = new Date(this.config.startDate);
                    var now = new Date();
                    
                    // Lấy ngày, tháng, năm để tính chính xác (bỏ qua giờ, phút, giây)
                    // Sử dụng UTC để tránh vấn đề timezone
                    var startYear = startDate.getUTCFullYear();
                    var startMonth = startDate.getUTCMonth();
                    var startDay = startDate.getUTCDate();
                    
                    var nowYear = now.getUTCFullYear();
                    var nowMonth = now.getUTCMonth();
                    var nowDay = now.getUTCDate();
                    
                    console.log('Calculating current day:');
                    console.log('Start date (UTC):', startYear + '-' + String(startMonth + 1).padStart(2, '0') + '-' + String(startDay).padStart(2, '0'));
                    console.log('Current date (UTC):', nowYear + '-' + String(nowMonth + 1).padStart(2, '0') + '-' + String(nowDay).padStart(2, '0'));
                    
                    // Tạo date objects chỉ với ngày (UTC)
                    var startDateOnly = new Date(Date.UTC(startYear, startMonth, startDay));
                    var nowOnly = new Date(Date.UTC(nowYear, nowMonth, nowDay));
                    
                    // Tính số ngày chênh lệch
                    var diffTime = nowOnly - startDateOnly;
                    var diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
                    
                    console.log('Time difference (ms):', diffTime);
                    console.log('Days difference:', diffDays);
                    
                    // Giới hạn trong khoảng 1-totalDays
                    var currentDay = Math.max(1, Math.min(diffDays, this.config.totalDays || 30));
                    
                    console.log('Final current day:', currentDay);
                    
                    return currentDay;
                },
                
                calculatePrice: function(day) {
                    if (day <= 1) {
                        return this.config.day1Price;
                    } else if (day <= 10) {
                        // Ngày 2-10: giảm mỗi ngày 100.000đ
                        var reduction = (day - 1) * this.config.day2to10Reduction;
                        return this.config.day1Price - reduction;
                    } else {
                        // Ngày 11-30: giảm mỗi ngày 50.000đ
                        // Đã giảm 9 ngày x 100.000 = 900.000
                        var firstReduction = 9 * this.config.day2to10Reduction;
                        var secondReduction = (day - 10) * this.config.day11to30Reduction;
                        return this.config.day1Price - firstReduction - secondReduction;
                    }
                },
                
                formatPrice: function(price) {
                    return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                },
                
                updatePricing: function(day) {
                    day = day || this.getCurrentDay();
                    var price = this.calculatePrice(day);
                    var formattedPrice = this.formatPrice(price);
                    var maxDay = this.config.totalDays || 30;
                    var progressPercent = (day / maxDay) * 100;
                    
                    $('.pricing-promotion-wrapper').each(function() {
                        var $w = $(this);
                        $w.find('.pricing-price-value').text(formattedPrice);
                        $w.find('.pricing-slider-fill').css('width', progressPercent + '%');
                    });
                },
                
                getNextResetTime: function() {
                    var now = new Date();
                    var tomorrow = new Date(now);
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    tomorrow.setHours(0, 0, 0, 0);
                    return tomorrow.getTime();
                },
                
                startCountdown: function() {
                    var self = this;
                    
                    function updateCountdown() {
                        var now = new Date().getTime();
                        var resetTime = self.getNextResetTime();
                        var distance = resetTime - now;
                        
                        if (distance < 0) {
                            self.updatePricing();
                            resetTime = self.getNextResetTime();
                            distance = resetTime - now;
                        }
                        
                        var days = String(Math.floor(distance / (1000 * 60 * 60 * 24))).padStart(2, '0');
                        var hours = String(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
                        var minutes = String(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
                        var seconds = String(Math.floor((distance % (1000 * 60)) / 1000)).padStart(2, '0');
                        
                        $('.pricing-promotion-wrapper').each(function() {
                            var $w = $(this);
                            $w.find('.countdown-days-num').text(days);
                            $w.find('.countdown-hours-num').text(hours);
                            $w.find('.countdown-minutes-num').text(minutes);
                            $w.find('.countdown-seconds-num').text(seconds);
                        });
                    }
                    
                    updateCountdown();
                    setInterval(updateCountdown, 1000);
                },
                
                setupAjaxUpdate: function() {
                    var self = this;
                    
                    // Cập nhật mỗi 5 phút để đồng bộ với server
                    setInterval(function() {
                        self.fetchLatestPricing();
                    }, 5 * 60 * 1000); // 5 phút
                    
                    // Cập nhật ngay khi load trang
                    self.fetchLatestPricing();
                },
                
                fetchLatestPricing: function() {
                    var self = this;
                    
                    // Lấy ajaxurl từ wp_localize_script hoặc fallback
                    var ajaxUrl = (typeof pricingAjax !== 'undefined' && pricingAjax.ajaxurl) ? pricingAjax.ajaxurl : (window.ajaxurl || '/wp-admin/admin-ajax.php');
                    
                    // Lấy nonce từ nhiều nguồn (ưu tiên theo thứ tự)
                    var nonce = '';
                    
                    // 1. Ưu tiên: từ window.pricingNonce (được set trong shortcode)
                    if (typeof window.pricingNonce !== 'undefined' && window.pricingNonce) {
                        nonce = window.pricingNonce;
                    }
                    // 2. Từ data attribute của pricing component
                    else {
                        var $pricingWrapper = $('.pricing-promotion-wrapper');
                        if ($pricingWrapper.length) {
                            nonce = $pricingWrapper.attr('data-pricing-nonce') || $pricingWrapper.data('pricing-nonce') || '';
                        }
                    }
                    // 3. Fallback: từ wp_localize_script
                    if (!nonce && typeof pricingAjax !== 'undefined' && pricingAjax.nonce) {
                        nonce = pricingAjax.nonce;
                    }
                    
                    console.log('Fetching pricing data from:', ajaxUrl);
                    console.log('Nonce value:', nonce);
                    console.log('Nonce present:', nonce ? 'Yes' : 'No');
                    console.log('Current config before fetch:', self.config);
                    
                    // Kiểm tra nonce trước khi gửi request
                    if (!nonce) {
                        console.error('Nonce is missing! Make sure pricing component has data-pricing-nonce attribute.');
                        var $pricingWrapper = $('.pricing-promotion-wrapper');
                        console.error('Pricing wrapper found:', $pricingWrapper.length > 0);
                        if ($pricingWrapper.length) {
                            console.error('Wrapper attributes:', $pricingWrapper[0].attributes);
                        }
                        return;
                    }
                    
                    // Debug: log nonce trước khi gửi
                    console.log('Sending AJAX request with nonce:', nonce);
                    console.log('AJAX data:', {
                        action: 'get_dynamic_pricing',
                        nonce: nonce
                    });
                    
                    $.ajax({
                        url: ajaxUrl,
                        type: 'POST',
                        data: {
                            action: 'get_dynamic_pricing',
                            nonce: nonce
                        },
                        success: function(response) {
                            console.log('Pricing AJAX Response:', response);
                            console.log('Response data:', JSON.stringify(response.data, null, 2));
                            
                            if (response.success && response.data) {
                                var configUpdated = false;
                                
                                // Cập nhật config từ server - LUÔN cập nhật từ server response
                                if (response.data.startDate) {
                                    var newStartDate = parseInt(response.data.startDate);
                                    var startDateObj = new Date(newStartDate);
                                    console.log('Received startDate from server:', newStartDate);
                                    console.log('Parsed as date:', startDateObj.toISOString());
                                    console.log('UTC Date:', startDateObj.getUTCFullYear() + '-' + 
                                               String(startDateObj.getUTCMonth() + 1).padStart(2, '0') + '-' + 
                                               String(startDateObj.getUTCDate()).padStart(2, '0'));
                                    console.log('Local Date:', startDateObj.getFullYear() + '-' + 
                                               String(startDateObj.getMonth() + 1).padStart(2, '0') + '-' + 
                                               String(startDateObj.getDate()).padStart(2, '0'));
                                    
                                    self.config.startDate = newStartDate;
                                    configUpdated = true;
                                }
                                if (response.data.day1Price !== undefined) {
                                    var newPrice = parseInt(response.data.day1Price);
                                    self.config.day1Price = newPrice;
                                    configUpdated = true;
                                }
                                if (response.data.day2to10Reduction !== undefined) {
                                    var newReduction = parseInt(response.data.day2to10Reduction);
                                    self.config.day2to10Reduction = newReduction;
                                    configUpdated = true;
                                }
                                if (response.data.day11to30Reduction !== undefined) {
                                    var newReduction2 = parseInt(response.data.day11to30Reduction);
                                    self.config.day11to30Reduction = newReduction2;
                                    configUpdated = true;
                                }
                                if (response.data.totalDays !== undefined) {
                                    var newTotalDays = parseInt(response.data.totalDays);
                                    self.config.totalDays = newTotalDays;
                                    configUpdated = true;
                                }
                                
                                // Luôn lưu config
                                if (configUpdated) {
                                    self.saveConfig();
                                }
                                console.log('Config saved: 1 ', self.config);
                                
                                var serverProgressPercent = response.data.progressPercent ? parseFloat(response.data.progressPercent) : null;
                                var currentDay = self.getCurrentDay();
                                var formattedPrice = self.formatPrice(self.calculatePrice(currentDay));
                                
                                $('.pricing-promotion-wrapper').each(function() {
                                    var $w = $(this);
                                    $w.find('.pricing-price-value').text(formattedPrice);
                                    var fillEl = $w.find('.pricing-slider-fill');
                                    if (serverProgressPercent != null && fillEl.length) {
                                        fillEl.css('width', serverProgressPercent + '%');
                                    } else {
                                        fillEl.css('width', (currentDay / (self.config.totalDays || 30) * 100) + '%');
                                    }
                                });
                            } else {
                                console.error('Invalid response:', response);
                            }
                        },
                        error: function(xhr, status, error) {
                            console.error('Error fetching pricing:', error);
                            console.error('XHR:', xhr);
                            console.error('Status:', status);
                            // Vẫn cập nhật với config hiện tại nếu có
                            if (self.config.startDate) {
                                var currentDay = self.getCurrentDay();
                                self.updatePricing(currentDay);
                            }
                        }
                    });
                }
            };
            
            // Initialize when document is ready
            // jQuery sẽ được đảm bảo đã load vì script được thêm vào footer
            jQuery(document).ready(function($) {
                console.log('jQuery ready, initializing Dynamic Pricing...');
                DynamicPricing.init();
            });
            
        })(jQuery);
    });</script>
<script>window.addEventListener('DOMContentLoaded', function() {
    jQuery(document).ready(function($) {
        // Define allowed countries
        var allowedCountries = ['vn', 'us', 'ca', 'gb', 'au', 'nz', 'sg'];
        
        // Function to filter country list
        function filterCountryList() {
            // Find all country lists
            $('.iti__country-list').each(function() {
                var $countryList = $(this);
                
                // Remove all countries except allowed ones
                $countryList.find('li.iti__country').each(function() {
                    var $country = $(this);
                    var countryCode = $country.attr('data-country-code');
                    
                    // If country is not in allowed list, remove it
                    if (countryCode && allowedCountries.indexOf(countryCode.toLowerCase()) === -1) {
                        $country.remove();
                    }
                });
                
                // Set default to Vietnam
                var $vietnam = $countryList.find('li[data-country-code="vn"]');
                if ($vietnam.length > 0) {
                    $vietnam.addClass('iti__preferred');
                    $countryList.prepend($vietnam);
                }
            });
        }
        
        // Run on page load
        setTimeout(filterCountryList, 500);
        
        // Run when WPForms loads dynamically
        $(document).on('wpformsReady', function() {
            setTimeout(filterCountryList, 500);

function devvnCheckLinkAvailability(link, successCallback, errorCallback) {
	var hiddenIframe = document.querySelector("#hiddenIframe");
	if (!hiddenIframe) {
		hiddenIframe = document.createElement("iframe");
		hiddenIframe.id = "hiddenIframe";
		hiddenIframe.style.display = "none";
		document.body.appendChild(hiddenIframe);
	}
	var timeout = setTimeout(function () {
		errorCallback("Link is not supported.");
		window.removeEventListener("blur", handleBlur);
	}, 2500); // Đặt timeout (2.5 giây) để kiểm tra liên kết. Thay đổi số này lên 5000 nếu bạn chưa chạy được
	var result = {};
	function handleMouseMove(event) {
		if (!result.x) {
			result = {
				x: event.clientX,
				y: event.clientY,
			};
		}
	}
	function handleBlur() {
		clearTimeout(timeout);
		window.addEventListener("mousemove", handleMouseMove);
	}
	window.addEventListener("blur", handleBlur);
	window.addEventListener(
		"focus",
		function onFocus() {
			setTimeout(function () {
				if (document.hasFocus()) {
					successCallback(function (pos) {
						if (!pos.x) {

							document.documentElement.clientWidth ||
							document.body.clientWidth;
						var alertWidth = 300;
						var alertHeight = 100;
						var isXInRange =
							pos.x - 100 < 0.5 * (screenWidth + alertWidth) &&
							pos.x + 100 > 0.5 * (screenWidth + alertWidth);
						var isYInRange =
							pos.y - 40 < alertHeight && pos.y + 40 > alertHeight;

							: "Link is not supported.";
					}(result));

	);

}
